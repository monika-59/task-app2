spring.application.name=smart-task-manager-backend

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:smart-task}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Monika123@}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:byJnYS4T7JzzzxzJ6GVST8Zu4Lb93AVL}
jwt.expiration=86400000

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
